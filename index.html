<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Монкедонія Радар</title>
    <link rel="manifest" href="manifest.json">
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #1e1e24;
            color: #fff;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
        }
        .container {
            text-align: center;
            padding: 20px;
            background: #2a2a35;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            width: 90%;
            max-width: 350px;
        }
        input {
            width: 100%;
            padding: 10px;
            margin-bottom: 20px;
            border-radius: 6px;
            border: 1px solid #444;
            background: #111;
            color: #fff;
            font-size: 16px;
            box-sizing: border-box;
        }
        button {
            width: 100%;
            padding: 12px;
            margin: 8px 0;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.2s;
        }
        .btn-short { background-color: #2ecc71; color: #fff; }
        .btn-long { background-color: #3498db; color: #fff; }
        button:active { transform: scale(0.98); }
    </style>
</head>
<body>

<div class="container">
    <h2>📡 Радар Доступності</h2>
    <input type="text" id="username" placeholder="Введи своє ім'я...">
    
    <button class="btn-short" onclick="sendTime(30)">🟢 Вільний на 30 хв</button>
    <button class="btn-long" onclick="sendTime(120)">⚡ Вільний на 2 години</button>
</div>

<script src="script.js"></script>
</body>
</html>
